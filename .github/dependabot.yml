version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    groups:
      next:
        patterns:
          - 'next'
          - '@next/*'
          - 'eslint-config-next'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      mui:
        patterns:
          - '@mui/*'
          - '@emotion/*'
      tanstack:
        patterns:
          - '@tanstack/*'
      tooling:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'prettier'
          - 'typescript'
          - 'typescript-eslint'
          - 'vitest'
          - '@vitejs/*'
          - '@playwright/test'
          - '@testing-library/*'
          - 'jsdom'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      types:
        patterns:
          - '@types/*'
        exclude-patterns:
          - '@types/react'
          - '@types/react-dom'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Tokyo
    labels:
      - ci
    groups:
      actions:
        patterns:
          - '*'
